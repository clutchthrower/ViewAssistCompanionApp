name: Build, Signed, Publish

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Calculate new version
        id: calc_version
        run: |
          # Use 'versionName = "' to avoid matching the println() line in the Gradle task
          CURRENT_VERSION=$(grep 'versionName = "' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)"/\1/' | tr -d '[:space:]')
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r -a version_parts <<< "$CURRENT_VERSION"
          MAJOR="${version_parts[0]}"
          MINOR="${version_parts[1]}"
          PATCH="${version_parts[2]}"

          if [ "${{ inputs.version_bump }}" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "${{ inputs.version_bump }}" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Increment version code
        id: inc_version_code
        run: |
          # versionCode is dynamic in build.gradle.kts — read the source of truth from version.properties
          CURRENT_VERSION_CODE=$(grep 'VERSION_CODE' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
          echo "version_code=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Previous version code: $CURRENT_VERSION_CODE"
          echo "New version code: $NEW_VERSION_CODE"

      - name: Update version files
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ steps.calc_version.outputs.new_version }}\"/" app/build.gradle.kts
          sed -i "s/VERSION_CODE=.*/VERSION_CODE=${{ steps.inc_version_code.outputs.version_code }}/" version.properties
          echo "Updated build.gradle.kts:"
          grep 'versionName' app/build.gradle.kts
          echo "Updated version.properties:"
          cat version.properties

      - name: Commit version bump and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts version.properties
          git commit -m "chore: bump version to ${{ steps.calc_version.outputs.new_version }} (versionCode ${{ steps.inc_version_code.outputs.version_code }})"
          git tag -a ${{ steps.calc_version.outputs.tag }} -m "Release ${{ steps.calc_version.outputs.tag }}"
          git push origin main
          git push origin ${{ steps.calc_version.outputs.tag }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Create Google Services JSON File
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > ./app/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: printf '%s' "$KEYSTORE_FILE" | base64 --decode > ./app/release.keystore

      - name: Convert keystore to legacy PKCS12
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          keytool -importkeystore \
            -srckeystore ./app/release.keystore \
            -destkeystore ./app/release-legacy.keystore \
            -deststoretype PKCS12 \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -deststorepass "$KEYSTORE_PASSWORD" \
            -J-Dkeystore.pkcs12.legacy \
            -noprompt
          mv ./app/release-legacy.keystore ./app/release.keystore

      - name: Build Signed Release APK and AAB
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.calc_version.outputs.tag }}
          name: Release ${{ steps.calc_version.outputs.tag }}
          files: |
            app/build/outputs/apk/release/vaca-*.apk
            app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

